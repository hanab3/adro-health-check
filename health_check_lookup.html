<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>건강검진 대상자 조회</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />

  <style>
    /* ============================================================
       ✏️ 커스터마이징 구역 — 여기만 수정하면 됩니다
       ============================================================ */
    :root {
      --color-primary:      #00E600;
      --color-primary-dark: #00B800;
      --color-bg:           #f1f5f9;
      --color-card:         #ffffff;
      --color-text-main:    #1e293b;
      --color-text-sub:     #64748b;
      --font: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--color-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--color-card);
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 460px;
    }

    .header { text-align: center; margin-bottom: 36px; }

    /* 로고 이미지 */
    .logo-img {
      display: block;
      margin: 0 auto 20px;
      max-width: 200px;   /* ✏️ 로고 최대 너비 조정 */
      max-height: 100px;  /* ✏️ 로고 최대 높이 조정 */
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text-main);
      margin-bottom: 6px;
    }
    .header p {
      font-size: 13.5px;
      color: var(--color-text-sub);
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 1px solid #e9eef5;
      margin: 0 0 28px;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-main);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      font-family: var(--font);
      color: var(--color-text-main);
      background: #f8fafc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input::placeholder { color: #b0bec5; }
    input:focus {
      border-color: var(--color-primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(0,230,0,0.15);
    }

    button {
      width: 100%;
      padding: 14px;
      background: var(--color-primary);
      color: #1a3a00;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    button:hover   { opacity: 0.9; }
    button:active  { transform: scale(0.99); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    #result { margin-top: 24px; display: none; }

    .result-box {
      border-radius: 14px;
      padding: 26px 22px;
      text-align: center;
    }
    .result-box.eligible     { background: #f0fdf4; border: 1.5px solid #86efac; }
    .result-box.not-eligible { background: #fff7ed; border: 1.5px solid #fed7aa; }
    .result-box.not-found    { background: #fef2f2; border: 1.5px solid #fca5a5; }
    .result-box.loading      { background: #f8fafc; border: 1.5px solid #e2e8f0; }

    .result-icon   { font-size: 38px; margin-bottom: 10px; }
    .result-name   { font-size: 12.5px; color: var(--color-text-sub); margin-bottom: 5px; }
    .result-status { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .eligible     .result-status { color: #15803d; }
    .not-eligible .result-status { color: #c2410c; }
    .not-found    .result-status { color: #b91c1c; }
    .result-desc { font-size: 13px; color: var(--color-text-sub); line-height: 1.7; }

    .spinner {
      width: 30px; height: 30px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .notice {
      font-size: 11.5px;
      color: #adb5bd;
      text-align: center;
      margin-top: 24px;
      line-height: 1.7;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; }
    }
  </style>
</head>

    <h1>건강검진 대상자 조회</h1>
    <p>이름과 생년월일을 입력하여<br/>건강검진 대상자 여부를 확인하세요</p>
  </div>

  <hr class="divider" />

  <form id="lookupForm">
    <div class="form-group">
      <label for="name">이름</label>
      <input type="text" id="name" placeholder="성함을 입력하세요" autocomplete="off" required />
    </div>
    <div class="form-group">
      <label for="dob">생년월일</label>
      <input type="date" id="dob" required />
    </div>
    <button type="submit" id="submitBtn">대상자 여부 조회하기</button>
  </form>

  <div id="result"></div>

  <p class="notice">
    입력하신 정보는 조회 목적으로만 사용되며 별도 저장되지 않습니다.<br/>
    문의: 경영관리팀 (Slack @shhan@adro.com)
  </p>
</div>

<script>
  // ============================================================
  // ✏️ [필수] Google Apps Script 배포 URL을 입력하세요
  // ============================================================
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz1Fv9KAqPQEiiBYQhNpTfWhcK282w31GjO_TqcJBMkPxDlXygofbd7CayRxb-idanb/exec";

  // ============================================================
  // ✏️ [선택] 결과 화면 메시지 수정
  // ============================================================
  const MESSAGES = {
    eligible: {
      icon: "✅",
      status: "건강검진 대상자입니다",
      desc: "올해 건강검진 대상자로 확인되었습니다.<br/>인사팀 공지에 따라 일정을 확인해 주세요."
    },
    not_eligible: {
      icon: "📋",
      status: "금년도 검진 대상자가 아닙니다",
      desc: "올해 건강검진 대상자가 아닙니다.<br/>문의사항은 인사팀으로 연락해 주세요."
    },
    not_found: {
      icon: "❓",
      status: "조회 결과 없음",
      desc: "입력하신 정보와 일치하는 데이터가 없습니다.<br/>이름 또는 생년월일을 다시 확인해 주세요."
    },
    error: {
      icon: "⚠️",
      status: "오류가 발생했습니다",
      desc: "잠시 후 다시 시도하거나 인사팀에 문의해 주세요."
    }
  };

  const form      = document.getElementById("lookupForm");
  const resultDiv = document.getElementById("result");
  const submitBtn = document.getElementById("submitBtn");

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    const name = document.getElementById("name").value.trim();
    const dob  = document.getElementById("dob").value;
    if (!name || !dob) return;

    submitBtn.disabled = true;
    submitBtn.textContent = "조회 중...";
    showLoading();

    try {
      const url = APPS_SCRIPT_URL + "?name=" + encodeURIComponent(name) + "&dob=" + encodeURIComponent(dob);
      const res = await fetch(url);
      if (!res.ok) throw new Error("서버 응답 오류");
      const data = await res.json();
      const status = ["eligible","not_eligible","not_found"].includes(data.status) ? data.status : "error";
      showResult(status, name);
    } catch {
      showResult("error", name);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "대상자 여부 조회하기";
    }
  });

  function showLoading() {
    resultDiv.style.display = "block";
    resultDiv.innerHTML = `
      <div class="result-box loading">
        <div class="spinner"></div>
        <div class="result-desc">데이터를 조회하고 있습니다...</div>
      </div>`;
  }

  function showResult(type, name) {
    const m = MESSAGES[type] || MESSAGES.error;
    const nameHtml = name ? `<div class="result-name">${esc(name)} 님</div>` : "";
    resultDiv.style.display = "block";
    resultDiv.innerHTML = `
      <div class="result-box ${type.replace("_","-")}">
        <div class="result-icon">${m.icon}</div>
        ${nameHtml}
        <div class="result-status">${m.status}</div>
        <div class="result-desc">${m.desc}</div>
      </div>`;
  }

  function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
